<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="./assets/icon.ico">

	<title>Kodiak Editor</title>
	<style>
		body { margin: 0; background-color: rgb(0, 0, 20) }
		canvas { display: block; }
	</style>
</head>
<body oncontextmenu="return false;" style="overflow: hidden;">
	<div style="z-index: 100; position: absolute; font-size: 0; width: 100%; height: 40px;">
		<button id="save_btn" class="menuButton">
		Save
		</button>

		<button id="load_btn" class="menuButton">
		Load <input type="file" id="fileInput" style="display: none;">
		</button>

		<button class="menuButton menuSection">Tool:</button>
		<button id="move_btn" class="menuButton">Move</button>
		<button id="scale_btn" class="menuButton">Scale</button>
		<button id="rotate_btn" class="menuButton">Rotate</button>
		<button id="del_btn" class="menuButton">Delete</button>
		<button id="clone_btn" class="menuButton">Duplicate</button>

		<button class="menuButton menuSection">Create:</button>
		<button id="new_object_btn" class="menuButton">+ New Object</button>

		<button class="menuButton menuSection">Snap:</button>
		<textarea class="menuButton" style="width: 50px; padding: 0;" id="snap_input">0.01</textarea>
	</div>


	<canvas id="canvas" class="editorCanvas"></canvas>

	<div id="progress_popup" hidden="true">
		<div id="progress_text">Loading...</div>
		<div id="progress_bar"></div>
	</div>


	<div id="material_list_bar" class="sidebar"></div>
	<div id="model_list_bar" class="sidebar"></div>

	<div id="material_model_config_bar" class="sidebar">
		<div class="sidebar_section subsection">Right click a material or model to configure it here</div>
	</div>

	<div id="object_config_bar" class="sidebar">
		<div id="object_id_display" class="sidebar_section"></div>

		<div class="sidebar_section headerSection">Transform:</div>

		<div class="sidebar_section">Position:</div>
		<div class="sidebar_section subsection">
		<span>
			x: <textarea id="input-pos-x" cols="3" rows="1"></textarea>
			y: <textarea id="input-pos-y" cols="3" rows="1"></textarea>
			z: <textarea id="input-pos-z" cols="3" rows="1"></textarea>
		</span>
		</div>

		<div class="sidebar_section">Scale:</div>
		<div class="sidebar_section subsection">
		<span>
			x: <textarea id="input-scl-x" cols="3" rows="1"></textarea>
			y: <textarea id="input-scl-y" cols="3" rows="1"></textarea>
			z: <textarea id="input-scl-z" cols="3" rows="1"></textarea>
		</span>
		</div>

		<div class="sidebar_section">Rotation:</div>
		<div class="sidebar_section subsection">
		<span>
			x: <textarea id="input-ro-x" cols="3" rows="1"></textarea>
			y: <textarea id="input-ro-y" cols="3" rows="1"></textarea>
			z: <textarea id="input-ro-z" cols="3" rows="1"></textarea>
		</span>
		</div>


		<div class="sidebar_section headerSection">Appearance:</div>

		<div class="sidebar_section">Tint:</div>
		<div class="sidebar_section subsection">
		<span>
			r: <textarea id="input-tint-r" cols="2" rows="1"></textarea>
			g: <textarea id="input-tint-g" cols="2" rows="1"></textarea>
			b: <textarea id="input-tint-b" cols="2" rows="1"></textarea>
			a: <textarea id="input-tint-a" cols="2" rows="1"></textarea>
		</span>
		</div>


		<div class="sidebar_section headerSection">Texture Coordinates:</div>

		<div class="sidebar_section">Scale:</div>
		<div class="sidebar_section subsection">
		<span>
			u: <textarea id="input-uv-scale-u" cols="2" rows="1">1</textarea>
			v: <textarea id="input-uv-scale-v" cols="2" rows="1">1</textarea>
			<br>
			<input type="checkbox" id="input-auto-uv-scale"> Automatic UV scaling
		</span>
		</div>

		<div class="sidebar_section">Offset:</div>
		<div class="sidebar_section subsection">
		<span>
			u: <textarea id="input-uv-offset-u" cols="2" rows="1">0</textarea>
			v: <textarea id="input-uv-offset-v" cols="2" rows="1">0</textarea>
		</span>
		</div>
	</div>

	<div class="sidebar" id="scripting_bar">
		<div id="script_header">
			Scripting
			<button id="scripting-run-button">Run</button>
		</div>
		<textarea id="script_text"></textarea>
		<div id="script_output"></div>
	</div>



	<script type="importmap">
		{
		"imports": {
			"three": "../three/build/three.module.js",
			"three/addons/": "../three/jsm/"
		}
		}
	</script>

	<script src="bridge.js"></script>
	<script type="module" src="editor.js"></script>
	</body>
</html>
